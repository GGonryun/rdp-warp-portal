<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>p0rtal — RDP Proxy Tester</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e4e4e7;
      --muted: #8b8d98;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --orange: #f97316;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    header h1 span { color: var(--accent); }

    .health-badge {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .health-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }

    .health-dot.ok { background: var(--green); }
    .health-dot.error { background: var(--red); }

    .grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 1.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
    }

    .card h2 {
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    input, select {
      width: 100%;
      padding: 0.5rem 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.9rem;
      font-family: inherit;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }

    button {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      width: 100%;
      padding: 0.65rem;
    }

    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-sm {
      padding: 0.3rem 0.6rem;
      font-size: 0.75rem;
      border-radius: 4px;
    }

    .btn-download {
      background: var(--green);
      color: white;
    }

    .btn-download:hover { opacity: 0.85; }

    .btn-danger {
      background: var(--red);
      color: white;
    }

    .btn-danger:hover { opacity: 0.85; }

    .btn-refresh {
      background: var(--border);
      color: var(--text);
    }

    .btn-refresh:hover { background: #3a3d4a; }

    .sessions-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .sessions-header h2 { margin-bottom: 0; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    th {
      text-align: left;
      padding: 0.5rem 0.75rem;
      color: var(--muted);
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }

    .state {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .state-waiting { background: rgba(234, 179, 8, 0.15); color: var(--yellow); }
    .state-active, .state-connected { background: rgba(34, 197, 94, 0.15); color: var(--green); }
    .state-terminated, .state-expired { background: rgba(239, 68, 68, 0.15); color: var(--red); }
    .state-error { background: rgba(249, 115, 22, 0.15); color: var(--orange); }

    .mono {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.8rem;
    }

    .actions {
      display: flex;
      gap: 0.4rem;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: 0.75rem 1.25rem;
      border-radius: 8px;
      font-size: 0.85rem;
      color: white;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      z-index: 100;
    }

    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: var(--green); }
    .toast.error { background: var(--red); }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .stat {
      background: var(--bg);
      border-radius: 6px;
      padding: 0.75rem;
      text-align: center;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Tab navigation */
    .tab-nav {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
    }

    .tab-nav button {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 500;
      padding: 0.5rem 0;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-nav button:hover { color: var(--text); }
    .tab-nav button.active { color: var(--text); border-bottom-color: var(--accent); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Recordings state badges */
    .state-recording { background: rgba(34, 197, 94, 0.15); color: var(--green); }
    .state-completed { background: rgba(99, 102, 241, 0.15); color: var(--accent); }
    .state-failed { background: rgba(239, 68, 68, 0.15); color: var(--red); }

    .btn-play {
      background: var(--accent);
      color: white;
    }
    .btn-play:hover { background: var(--accent-hover); }

    .btn-back {
      background: var(--border);
      color: var(--text);
      margin-bottom: 1rem;
    }
    .btn-back:hover { background: #3a3d4a; }

    /* Playback view */
    .playback-view {
      display: flex;
      gap: 1rem;
      height: calc(100vh - 12rem);
    }

    .playback-video {
      flex: 0 0 70%;
      display: flex;
      flex-direction: column;
    }

    .playback-video video {
      width: 100%;
      flex: 1;
      background: #000;
      border-radius: 8px;
    }

    .playback-events {
      flex: 0 0 30%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .playback-events h3 {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 0.75rem;
      flex-shrink: 0;
    }

    .events-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .event-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.6rem 0.75rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .event-card:hover { border-color: var(--accent); }
    .event-card.active { border-color: var(--accent); background: rgba(99, 102, 241, 0.08); }

    .event-time {
      font-size: 0.7rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }

    .event-type {
      display: inline-block;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      font-size: 0.7rem;
      font-weight: 500;
      margin-bottom: 0.25rem;
    }

    .event-type-process_start { background: rgba(34, 197, 94, 0.15); color: var(--green); }
    .event-type-process_end { background: rgba(239, 68, 68, 0.15); color: var(--red); }
    .event-type-window_focus { background: rgba(99, 102, 241, 0.15); color: var(--accent); }
    .event-type-mouse_click { background: rgba(234, 179, 8, 0.15); color: #eab308; }
    .event-type-clipboard { background: rgba(168, 85, 247, 0.15); color: #a855f7; }
    .event-type-winlog { background: rgba(249, 115, 22, 0.15); color: var(--orange); }

    .event-ts {
      font-size: 0.65rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--muted);
      margin-top: 0.2rem;
      opacity: 0.7;
    }

    .event-detail {
      font-size: 0.78rem;
      color: var(--text);
      word-break: break-word;
    }

    /* Recording info modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 480px;
      max-width: 90vw;
      max-height: 80vh;
      overflow-y: auto;
      padding: 1.5rem;
      transform: scale(0.95);
      transition: transform 0.2s;
    }

    .modal-overlay.show .modal {
      transform: scale(1);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .modal-header h3 {
      font-size: 1rem;
      font-weight: 600;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0.25rem;
      line-height: 1;
    }

    .modal-close:hover { color: var(--text); }

    .info-grid {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 0.5rem 0.75rem;
      font-size: 0.85rem;
    }

    .info-label {
      color: var(--muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding-top: 0.15rem;
    }

    .info-value {
      color: var(--text);
      word-break: break-all;
    }

    .btn-info {
      background: var(--border);
      color: var(--text);
    }

    .btn-info:hover { background: #3a3d4a; }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .playback-view { flex-direction: column; height: auto; }
      .playback-video, .playback-events { flex: 1 1 auto; }
      .playback-events { max-height: 40vh; }
    }
  </style>
</head>
<body>

<header>
  <h1><span>p0rtal</span> — RDP Proxy Tester</h1>
  <div style="display:flex;align-items:center;gap:1rem;">
    <div style="position:relative;display:flex;align-items:center;">
      <input type="password" id="api-key" placeholder="API Key" value=""
        style="width:200px;padding:0.35rem 2rem 0.35rem 0.6rem;font-size:0.8rem;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);"
        oninput="saveApiKey()" />
      <button onclick="toggleApiKeyVisibility()" title="Toggle visibility"
        style="position:absolute;right:0.4rem;background:none;border:none;cursor:pointer;color:var(--muted);padding:0;line-height:1;font-size:1rem;">
        <span id="api-key-eye">👁</span>
      </button>
    </div>
    <label style="margin:0;display:flex;align-items:center;gap:0.3rem;cursor:pointer;font-size:0.8rem;color:var(--muted);">
      <input type="checkbox" id="auto-refresh" checked> Auto-refresh
    </label>
    <div class="health-badge">
      <div class="health-dot" id="health-dot"></div>
      <span id="health-text">Checking...</span>
    </div>
  </div>
</header>

<div class="tab-nav">
  <button class="active" data-tab="sessions" onclick="switchTab('sessions')">Sessions</button>
  <button data-tab="recordings" onclick="switchTab('recordings')">Recordings</button>
  <button data-tab="access" onclick="switchTab('access')">Access Control</button>
</div>

<div id="tab-sessions" class="tab-content active">
  <div class="grid">
    <!-- Left panel: Create session -->
    <div>
      <div class="card" style="margin-bottom: 1.5rem;">
        <h2>Broker Status</h2>
        <div class="stats">
          <div class="stat">
            <div class="stat-value" id="stat-sessions">—</div>
            <div class="stat-label">Active Sessions</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="stat-ports">—</div>
            <div class="stat-label">Available Ports</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Create Session</h2>
        <div class="form-group">
          <label for="user-id">User ID</label>
          <input type="text" id="user-id" value="tester" placeholder="e.g. tester">
        </div>
        <div class="form-group">
          <label for="target-select">Target</label>
          <select id="target-select" onchange="onTargetChange()">
            <option value="">Loading destinations...</option>
          </select>
        </div>
        <div class="form-group">
          <label for="username-select">Login As</label>
          <select id="username-select">
            <option value="">Select a target first</option>
          </select>
        </div>
        <button class="btn-primary" id="create-btn" onclick="createSession()">
          Create Session
        </button>
      </div>
    </div>

    <!-- Right panel: Sessions table -->
    <div class="card">
      <div class="sessions-header">
        <h2>Sessions</h2>
        <button class="btn-sm btn-refresh" onclick="loadSessions()">Refresh</button>
      </div>
      <div id="sessions-container">
        <div class="empty-state">No sessions yet. Create one to get started.</div>
      </div>
    </div>
  </div>
</div>

<div id="tab-recordings" class="tab-content">
  <div class="card" id="recordings-list-view">
    <div class="sessions-header">
      <h2>Recordings</h2>
      <button class="btn-sm btn-refresh" onclick="loadRecordings()">Refresh</button>
    </div>
    <div style="margin-bottom:1rem; display:flex; gap:0.5rem; flex-wrap:wrap; align-items:flex-end;">
      <div>
        <label style="font-size:0.75rem;color:var(--muted);">Target</label>
        <input id="filter-target" placeholder="e.g. mike-rdp" style="display:block;padding:0.35rem 0.6rem;font-size:0.85rem;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);width:140px;" />
      </div>
      <div>
        <label style="font-size:0.75rem;color:var(--muted);">User</label>
        <input id="filter-user" placeholder="e.g. rdpadmin" style="display:block;padding:0.35rem 0.6rem;font-size:0.85rem;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);width:130px;" />
      </div>
      <div>
        <label style="font-size:0.75rem;color:var(--muted);">From</label>
        <input id="filter-start" type="datetime-local" style="display:block;padding:0.35rem 0.6rem;font-size:0.85rem;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);width:185px;" />
      </div>
      <div>
        <label style="font-size:0.75rem;color:var(--muted);">To</label>
        <input id="filter-end" type="datetime-local" style="display:block;padding:0.35rem 0.6rem;font-size:0.85rem;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);width:185px;" />
      </div>
      <div>
        <label style="font-size:0.75rem;color:var(--muted);">Status</label>
        <select id="filter-status" style="display:block;padding:0.35rem 0.6rem;font-size:0.85rem;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);width:120px;">
          <option value="">All</option>
          <option value="recording">Recording</option>
          <option value="completed">Completed</option>
          <option value="failed">Failed</option>
        </select>
      </div>
      <button class="btn-sm btn-primary" onclick="loadRecordings()" style="height:fit-content;padding:0.4rem 0.75rem;">Search</button>
      <button class="btn-sm btn-refresh" onclick="clearRecordingFilters()" style="height:fit-content;padding:0.4rem 0.75rem;">Clear</button>
    </div>
    <div id="recordings-container">
      <div class="empty-state">No recordings found.</div>
    </div>
  </div>
  <div id="recordings-playback-view" style="display:none;">
    <button class="btn-sm btn-back" onclick="closePlayback()">&#8592; Back to Recordings</button>
    <div class="playback-view">
      <div class="playback-video">
        <video id="playback-video" controls></video>
      </div>
      <div class="playback-events card">
        <h3>Event Timeline</h3>
        <div class="events-list" id="events-list"></div>
      </div>
    </div>
  </div>
</div>

<div id="tab-access" class="tab-content">
  <div class="card">
    <div class="sessions-header">
      <h2>Access Control</h2>
      <button class="btn-sm btn-refresh" onclick="loadAccess()">Refresh</button>
    </div>
    <div style="margin-bottom:1rem; display:flex; gap:0.5rem; flex-wrap:wrap; align-items:flex-end;">
      <div>
        <label style="font-size:0.75rem;color:var(--muted);">Email</label>
        <input id="grant-email" placeholder="user@example.com" style="display:block;padding:0.35rem 0.6rem;font-size:0.85rem;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);width:200px;" />
      </div>
      <div>
        <label style="font-size:0.75rem;color:var(--muted);">Target ID</label>
        <input id="grant-target" placeholder="dc-01" style="display:block;padding:0.35rem 0.6rem;font-size:0.85rem;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);width:140px;" />
      </div>
      <div>
        <label style="font-size:0.75rem;color:var(--muted);">Username</label>
        <input id="grant-username" placeholder="rdpadmin" style="display:block;padding:0.35rem 0.6rem;font-size:0.85rem;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);width:140px;" />
      </div>
      <button class="btn btn-primary" onclick="grantAccess()" style="height:fit-content;">Grant</button>
    </div>
    <div id="access-container">
      <div class="empty-state">No access grants found.</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="recording-info-modal" onclick="closeRecordingInfo(event)">
  <div class="modal">
    <div class="modal-header">
      <h3>Recording Details</h3>
      <button class="modal-close" onclick="closeRecordingInfo()">&times;</button>
    </div>
    <div class="info-grid" id="recording-info-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = '';
  let autoRefreshTimer = null;

  function getApiKey() {
    return document.getElementById('api-key').value.trim();
  }

  function toggleApiKeyVisibility() {
    const input = document.getElementById('api-key');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  function saveApiKey() {
    localStorage.setItem('p0rtal_api_key', getApiKey());
  }

  function getUserId() {
    return document.getElementById('user-id').value.trim() || 'tester';
  }

  function apiFetch(url, options = {}) {
    const key = getApiKey();
    if (key) {
      options.headers = options.headers || {};
      options.headers['Authorization'] = 'Bearer ' + key;
    }
    return fetch(url, options);
  }

  function toast(message, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = message;
    el.className = 'toast ' + type + ' show';
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  function stateClass(state) {
    state = (state || '').toLowerCase();
    if (state === 'waiting_for_connection') return 'state-waiting';
    if (state === 'active' || state === 'connected') return 'state-active';
    if (state === 'terminated') return 'state-terminated';
    if (state === 'expired') return 'state-expired';
    if (state === 'error') return 'state-error';
    return '';
  }

  function shortId(id) {
    return id.length > 12 ? id.substring(0, 12) + '...' : id;
  }

  function relativeTime(dateStr) {
    if (!dateStr) return '—';
    const d = new Date(dateStr);
    const diff = Math.floor((Date.now() - d.getTime()) / 1000);
    if (diff < 60) return diff + 's ago';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    return Math.floor(diff / 3600) + 'h ago';
  }

  // Health check
  async function checkHealth() {
    try {
      const resp = await apiFetch(API + '/health');
      const data = await resp.json();
      document.getElementById('health-dot').className = 'health-dot ok';
      document.getElementById('health-text').textContent =
        'Broker Online';
      document.getElementById('stat-sessions').textContent = data.active_sessions;
      document.getElementById('stat-ports').textContent = data.available_ports;
    } catch (e) {
      document.getElementById('health-dot').className = 'health-dot error';
      document.getElementById('health-text').textContent = 'Broker Offline';
      document.getElementById('stat-sessions').textContent = '—';
      document.getElementById('stat-ports').textContent = '—';
    }
  }

  // Load targets (with users)
  let destinations = [];

  async function loadDestinations() {
    try {
      const resp = await apiFetch(API + '/api/targets');
      destinations = await resp.json();
      const select = document.getElementById('target-select');
      select.innerHTML = '';
      if (destinations.length === 0) {
        select.innerHTML = '<option value="">No destinations configured</option>';
        return;
      }
      destinations.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.id;
        opt.textContent = d.hostname + ' (' + d.ip + ')';
        select.appendChild(opt);
      });
      onTargetChange();
    } catch (e) {
      document.getElementById('target-select').innerHTML =
        '<option value="">Failed to load destinations</option>';
    }
  }

  function onTargetChange() {
    const targetId = document.getElementById('target-select').value;
    const usernameSelect = document.getElementById('username-select');
    usernameSelect.innerHTML = '';

    const dest = destinations.find(d => d.id === targetId);
    if (!dest || !dest.users || dest.users.length === 0) {
      usernameSelect.innerHTML = '<option value="">No users available</option>';
      return;
    }

    dest.users.forEach(u => {
      const opt = document.createElement('option');
      opt.value = u.username;
      opt.textContent = u.username;
      usernameSelect.appendChild(opt);
    });
  }

  // List sessions
  async function loadSessions() {
    try {
      const resp = await apiFetch(API + '/api/sessions?user_id=');
      const sessions = await resp.json();
      const container = document.getElementById('sessions-container');

      if (!sessions || sessions.length === 0) {
        container.innerHTML = '<div class="empty-state">No sessions yet. Create one to get started.</div>';
        return;
      }

      // Sort: active first, then by created_at desc
      sessions.sort((a, b) => {
        const stateOrder = { creating: 0, active: 0, connected: 0, terminating: 1, terminated: 2, expired: 2 };
        const sa = stateOrder[a.state] ?? 1;
        const sb = stateOrder[b.state] ?? 1;
        if (sa !== sb) return sa - sb;
        return new Date(b.created_at) - new Date(a.created_at);
      });

      let html = `<table>
        <thead><tr>
          <th>Session ID</th>
          <th>User</th>
          <th>Target</th>
          <th>Port</th>
          <th>State</th>
          <th>Created</th>
          <th>Actions</th>
        </tr></thead><tbody>`;

      sessions.forEach(s => {
        const isActive = ['creating', 'active', 'connected'].includes(s.state);
        html += `<tr style="${!isActive ? 'opacity:0.55' : ''}">
          <td class="mono" title="${s.session_id}">${shortId(s.session_id)}</td>
          <td>${s.user_id || '—'}</td>
          <td>${s.target_id}</td>
          <td class="mono">${s.proxy_port || '—'}</td>
          <td><span class="state ${stateClass(s.state)}">${s.state}</span></td>
          <td>${relativeTime(s.created_at)}</td>
          <td class="actions">
            ${isActive ? `<button class="btn-sm btn-download" onclick="downloadRDP('${s.session_id}')">RDP</button>` : ''}
            ${isActive ? `<button class="btn-sm btn-danger" onclick="terminateSession('${s.session_id}')">Kill</button>` : ''}
          </td>
        </tr>`;
      });

      html += '</tbody></table>';
      container.innerHTML = html;
    } catch (e) {
      console.error('Failed to load sessions', e);
    }

    checkHealth();
  }

  // Create session
  async function createSession() {
    const targetId = document.getElementById('target-select').value;
    const username = document.getElementById('username-select').value;
    if (!targetId) {
      toast('Select a target first', 'error');
      return;
    }
    if (!username) {
      toast('Select a username first', 'error');
      return;
    }

    const btn = document.getElementById('create-btn');
    btn.disabled = true;
    btn.textContent = 'Creating...';

    try {
      const resp = await apiFetch(API + '/api/sessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          target_id: targetId,
          username: username,
          user_id: getUserId()
        })
      });

      if (!resp.ok) {
        const err = await resp.json();
        throw new Error(err.message || 'Failed to create session');
      }

      const data = await resp.json();
      toast('Session created: ' + shortId(data.session_id));
      loadSessions();
    } catch (e) {
      toast(e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create Session';
    }
  }

  // Download RDP file
  async function downloadRDP(sessionId) {
    try {
      const resp = await apiFetch(API + '/api/sessions/' + sessionId + '/rdp');
      if (!resp.ok) throw new Error('Failed to download RDP file');
      const blob = await resp.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = sessionId + '.rdp';
      a.click();
      URL.revokeObjectURL(url);
    } catch (e) {
      toast(e.message, 'error');
    }
  }

  // Terminate session
  async function terminateSession(sessionId) {
    try {
      const resp = await apiFetch(API + '/api/sessions/' + sessionId, { method: 'DELETE' });
      if (resp.ok || resp.status === 204) {
        toast('Session terminated');
      } else {
        const err = await resp.json();
        throw new Error(err.message || 'Failed to terminate');
      }
    } catch (e) {
      toast(e.message, 'error');
    }
    loadSessions();
  }

  // Global auto-refresh — refreshes whichever tab is active.
  function autoRefreshTick() {
    if (activeTab === 'sessions') loadSessions();
    else if (activeTab === 'recordings' && document.getElementById('recordings-list-view').style.display !== 'none') loadRecordings();
    else if (activeTab === 'access') loadAccess();
  }

  function setupAutoRefresh() {
    if (autoRefreshTimer) clearInterval(autoRefreshTimer);
    const checkbox = document.getElementById('auto-refresh');
    if (checkbox.checked) {
      autoRefreshTimer = setInterval(autoRefreshTick, 5000);
    }
    checkbox.addEventListener('change', () => {
      if (autoRefreshTimer) clearInterval(autoRefreshTimer);
      autoRefreshTimer = null;
      if (checkbox.checked) {
        autoRefreshTimer = setInterval(autoRefreshTick, 5000);
      }
    });
  }

  // Tab switching
  let activeTab = 'sessions';
  let recordingsRefreshTimer = null; // unused, kept for compat

  function switchTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab-nav button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tab === tab);
    });
    document.querySelectorAll('.tab-content').forEach(el => {
      el.classList.toggle('active', el.id === 'tab-' + tab);
    });
    if (tab === 'recordings') {
      loadRecordings();
    }
    if (tab === 'access') {
      loadAccess();
    }
  }

  function startRecordingsAutoRefresh() {
    // No-op: handled by global auto-refresh.
  }

  function stopRecordingsAutoRefresh() {
    // No-op: handled by global auto-refresh.
  }

  // Recordings
  function recordingStateClass(status) {
    status = (status || '').toLowerCase();
    if (status === 'recording') return 'state-recording';
    if (status === 'completed') return 'state-completed';
    if (status === 'failed') return 'state-failed';
    return '';
  }

  function formatDuration(seconds) {
    if (seconds == null || isNaN(seconds)) return '—';
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    return m + 'm ' + s + 's';
  }

  function formatBytes(bytes) {
    if (bytes == null || bytes === 0) return '—';
    const units = ['B', 'KB', 'MB', 'GB'];
    let i = 0;
    let val = bytes;
    while (val >= 1024 && i < units.length - 1) { val /= 1024; i++; }
    return val.toFixed(i === 0 ? 0 : 1) + ' ' + units[i];
  }

  function buildRecordingQuery() {
    const params = new URLSearchParams();
    const target = document.getElementById('filter-target').value.trim();
    const user = document.getElementById('filter-user').value.trim();
    const start = document.getElementById('filter-start').value;
    const end = document.getElementById('filter-end').value;
    const status = document.getElementById('filter-status').value;
    if (target) params.set('target', target);
    if (user) params.set('user', user);
    if (start) params.set('start', new Date(start).toISOString());
    if (end) params.set('end', new Date(end).toISOString());
    if (status) params.set('status', status);
    const qs = params.toString();
    return qs ? '?' + qs : '';
  }

  function clearRecordingFilters() {
    document.getElementById('filter-target').value = '';
    document.getElementById('filter-user').value = '';
    document.getElementById('filter-start').value = '';
    document.getElementById('filter-end').value = '';
    document.getElementById('filter-status').value = '';
    loadRecordings();
  }

  async function loadRecordings() {
    try {
      const resp = await apiFetch(API + '/api/recordings' + buildRecordingQuery());
      const container = document.getElementById('recordings-container');
      if (!resp.ok) {
        const err = await resp.text();
        console.error('Failed to load recordings:', resp.status, err);
        container.innerHTML = '<div class="empty-state">Error loading recordings: ' + resp.status + '</div>';
        return;
      }
      const recordings = await resp.json();

      if (!Array.isArray(recordings) || recordings.length === 0) {
        container.innerHTML = '<div class="empty-state">No recordings found.</div>';
        return;
      }

      let html = `<table>
        <thead><tr>
          <th>ID</th>
          <th>Target</th>
          <th>User</th>
          <th>Status</th>
          <th>Duration</th>
          <th>Size</th>
          <th>Started</th>
          <th>Actions</th>
        </tr></thead><tbody>`;

      recordings.forEach(r => {
        html += `<tr>
          <td class="mono" title="${r.id}">${shortId(r.id)}</td>
          <td>${r.target_name || '—'}</td>
          <td>${r.windows_user || '—'}</td>
          <td><span class="state ${recordingStateClass(r.status)}">${r.status}</span></td>
          <td>${formatDuration(r.duration_secs)}</td>
          <td>${formatBytes(r.total_bytes)}</td>
          <td>${relativeTime(r.started_at)}</td>
          <td class="actions">
            <button class="btn-sm btn-info" onclick="showRecordingInfo('${r.id}')">Info</button>
            <button class="btn-sm btn-play" onclick="openPlayback('${r.id}', '${r.started_at || ''}')">Play</button>
            <button class="btn-sm btn-danger" onclick="deleteRecording('${r.id}')">Delete</button>
          </td>
        </tr>`;
      });

      html += '</tbody></table>';
      container.innerHTML = html;
    } catch (e) {
      console.error('Failed to load recordings', e);
    }
  }

  async function deleteRecording(id) {
    if (!confirm('Delete this recording? This cannot be undone.')) return;
    try {
      const resp = await apiFetch(API + '/api/recordings/' + id, { method: 'DELETE' });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ error: resp.statusText }));
        alert('Failed to delete recording: ' + (err.error || resp.statusText));
        return;
      }
      loadRecordings();
    } catch (e) {
      console.error('Failed to delete recording', e);
    }
  }

  // Recording info modal
  async function showRecordingInfo(id) {
    const body = document.getElementById('recording-info-body');
    body.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:1rem;">Loading...</div>';
    document.getElementById('recording-info-modal').classList.add('show');

    try {
      const resp = await apiFetch(API + '/api/recordings/' + id);
      if (!resp.ok) throw new Error('Failed to fetch recording');
      const r = await resp.json();

      const started = r.started_at ? new Date(r.started_at).toLocaleString() : '—';
      const ended = r.ended_at ? new Date(r.ended_at).toLocaleString() : '—';

      const rows = [
        ['ID', r.id],
        ['Session ID', r.session_id || '—'],
        ['Status', r.status],
        ['Target', r.target_name || '—'],
        ['Target ID', r.target_id || '—'],
        ['Windows User', r.windows_user || '—'],
        ['Proxy User', r.proxy_user || '—'],
        ['Agent Host', r.agent_hostname || '—'],
        ['Started', started],
        ['Ended', ended],
        ['Duration', formatDuration(r.duration_secs)],
        ['Size', formatBytes(r.total_bytes)],
        ['Chunks', r.chunk_count != null ? r.chunk_count : '—'],
        ['Events', r.event_count != null ? r.event_count : '—'],
      ];

      body.innerHTML = rows.map(([label, value]) =>
        `<div class="info-label">${label}</div><div class="info-value">${value}</div>`
      ).join('');
    } catch (e) {
      body.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--red);padding:1rem;">Failed to load recording details.</div>';
    }
  }

  function closeRecordingInfo(event) {
    if (event && event.target !== event.currentTarget) return;
    document.getElementById('recording-info-modal').classList.remove('show');
  }

  // Access Control
  async function loadAccess() {
    try {
      const resp = await apiFetch(API + '/api/access');
      const container = document.getElementById('access-container');
      if (!resp.ok) {
        const err = await resp.text();
        console.error('Failed to load access:', resp.status, err);
        container.innerHTML = '<div class="empty-state">Error loading access: ' + resp.status + '</div>';
        return;
      }
      const entries = await resp.json();

      if (!Array.isArray(entries) || entries.length === 0) {
        container.innerHTML = '<div class="empty-state">No access grants found.</div>';
        return;
      }

      let html = `<table>
        <thead><tr>
          <th>Email</th>
          <th>Target</th>
          <th>Username</th>
          <th>Actions</th>
        </tr></thead><tbody>`;

      entries.forEach(e => {
        html += `<tr>
          <td>${e.email}</td>
          <td class="mono">${e.target_id}</td>
          <td>${e.username}</td>
          <td class="actions">
            <button class="btn-sm btn-danger" onclick="revokeAccess('${e.email}', '${e.target_id}', '${e.username}')">Revoke</button>
          </td>
        </tr>`;
      });

      html += '</tbody></table>';
      container.innerHTML = html;
    } catch (e) {
      console.error('Failed to load access', e);
    }
  }

  async function grantAccess() {
    const email = document.getElementById('grant-email').value.trim();
    const targetId = document.getElementById('grant-target').value.trim();
    const username = document.getElementById('grant-username').value.trim();
    if (!email || !targetId || !username) {
      toast('All fields are required', 'error');
      return;
    }
    try {
      const resp = await apiFetch(API + '/api/grant', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, target_id: targetId, username })
      });
      if (resp.ok) {
        toast('Access granted to ' + email);
        document.getElementById('grant-email').value = '';
        document.getElementById('grant-target').value = '';
        document.getElementById('grant-username').value = '';
        loadAccess();
      } else {
        const err = await resp.json();
        toast(err.message || 'Failed to grant access', 'error');
      }
    } catch (e) {
      toast('Failed to grant access', 'error');
    }
  }

  async function revokeAccess(email, targetId, username) {
    if (!confirm('Revoke access for ' + email + ' on ' + targetId + '? Active sessions will be terminated.')) return;
    try {
      const resp = await apiFetch(API + '/api/revoke', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, target_id: targetId, username })
      });
      if (resp.ok) {
        toast('Access revoked for ' + email);
        loadAccess();
      } else {
        const err = await resp.json();
        toast(err.message || 'Failed to revoke access', 'error');
      }
    } catch (e) {
      toast('Failed to revoke access', 'error');
    }
  }

  // Playback
  let playbackEvents = [];
  let playbackStartTime = 0;
  let hlsInstance = null;

  function openPlayback(recordingId, startedAt) {
    stopRecordingsAutoRefresh();
    document.getElementById('recordings-list-view').style.display = 'none';
    document.getElementById('recordings-playback-view').style.display = 'block';

    const video = document.getElementById('playback-video');
    const hlsUrl = API + '/api/recordings/' + recordingId + '/hls/playlist.m3u8';

    // Clean up previous HLS instance
    if (hlsInstance) {
      hlsInstance.destroy();
      hlsInstance = null;
    }

    if (Hls.isSupported()) {
      hlsInstance = new Hls({
        liveDurationInfinity: true,
        manifestLoadingTimeOut: 10000,
        manifestLoadingMaxRetry: 6,
        levelLoadingTimeOut: 10000,
        fragLoadingMaxRetry: 6,
        enableWorker: true,
        xhrSetup: function(xhr) {
          const key = getApiKey();
          if (key) xhr.setRequestHeader('Authorization', 'Bearer ' + key);
        }
      });
      hlsInstance.loadSource(hlsUrl);
      hlsInstance.attachMedia(video);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
        video.play().catch(() => {});
      });
      // Recover from errors caused by codec discontinuities (ffmpeg restarts).
      hlsInstance.on(Hls.Events.ERROR, function(event, data) {
        if (data.fatal) {
          switch (data.type) {
            case Hls.ErrorTypes.MEDIA_ERROR:
              console.warn('HLS media error, attempting recovery');
              hlsInstance.recoverMediaError();
              break;
            case Hls.ErrorTypes.NETWORK_ERROR:
              console.warn('HLS network error, retrying');
              hlsInstance.startLoad();
              break;
            default:
              console.error('HLS fatal error', data);
              hlsInstance.destroy();
              break;
          }
        }
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      // Native HLS support (Safari)
      video.src = hlsUrl;
      video.addEventListener('loadedmetadata', function() {
        video.play().catch(() => {});
      }, { once: true });
    } else {
      // Fallback to direct video
      video.src = API + '/api/recordings/' + recordingId + '/video';
      video.load();
    }

    playbackStartTime = startedAt ? new Date(startedAt).getTime() : 0;
    playbackEvents = [];

    video.ontimeupdate = function() {
      highlightCurrentEvent(video.currentTime);
    };

    loadEvents(recordingId);
  }

  function closePlayback() {
    const video = document.getElementById('playback-video');
    video.pause();

    if (hlsInstance) {
      hlsInstance.destroy();
      hlsInstance = null;
    }

    video.removeAttribute('src');
    video.load();

    document.getElementById('recordings-playback-view').style.display = 'none';
    document.getElementById('recordings-list-view').style.display = 'block';
    startRecordingsAutoRefresh();
  }

  async function loadEvents(recordingId) {
    try {
      const resp = await apiFetch(API + '/api/recordings/' + recordingId + '/events');
      const events = await resp.json();
      playbackEvents = (events || []).map(e => {
        let offsetSec = 0;
        const ts = e.ts || e.timestamp;
        if (ts && playbackStartTime) {
          offsetSec = Math.max(0, (new Date(ts).getTime() - playbackStartTime) / 1000);
        } else if (e.offset != null) {
          offsetSec = e.offset;
        }
        return { ...e, offsetSec, _ts: ts };
      }).sort((a, b) => a.offsetSec - b.offsetSec);

      renderEvents();
    } catch (e) {
      console.error('Failed to load events', e);
      document.getElementById('events-list').innerHTML =
        '<div class="empty-state">Failed to load events.</div>';
    }
  }

  function formatTimestamp(seconds) {
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }

  function eventTypeClass(type) {
    type = (type || '').toLowerCase();
    if (type === 'process_start') return 'event-type-process_start';
    if (type === 'process_end') return 'event-type-process_end';
    if (type === 'window_focus') return 'event-type-window_focus';
    if (type === 'mouse_click') return 'event-type-mouse_click';
    if (type === 'clipboard') return 'event-type-clipboard';
    if (type === 'winlog') return 'event-type-winlog';
    return '';
  }

  function eventDetails(event) {
    const d = event.data || {};
    const type = (event.type || '').toLowerCase();

    if (type === 'process_start') {
      const parts = [d.name || ''];
      if (d.command_line) parts.push(d.command_line);
      if (d.pid) parts[0] += ' (PID ' + d.pid + ')';
      return parts.filter(Boolean).join(' — ') || '—';
    }
    if (type === 'process_end') {
      return (d.name || '?') + ' (PID ' + (d.pid || '?') + ') exited' + (d.exit_code != null ? ' code ' + d.exit_code : '');
    }
    if (type === 'window_focus') {
      return d.title || '—';
    }
    if (type === 'mouse_click') {
      return (d.button || 'left') + ' click at (' + (d.x || 0) + ', ' + (d.y || 0) + ')' + (d.window ? ' — ' + d.window : '');
    }
    if (type === 'clipboard') {
      const text = d.content || '';
      return 'Copied: ' + (text.length > 80 ? text.substring(0, 80) + '...' : text);
    }
    if (type === 'winlog') {
      const eid = d.event_id || '?';
      const log = d.log || '';
      const msg = d.message || '';
      const user = d.user ? ' [' + d.user + ']' : '';
      const script = d.script_block ? ' — ' + (d.script_block.length > 60 ? d.script_block.substring(0, 60) + '...' : d.script_block) : '';
      return '[' + log + ':' + eid + ']' + user + ' ' + msg + script;
    }

    // Fallback
    return JSON.stringify(d).substring(0, 120);
  }

  function renderEvents() {
    const container = document.getElementById('events-list');
    if (playbackEvents.length === 0) {
      container.innerHTML = '<div class="empty-state">No events recorded.</div>';
      return;
    }

    container.innerHTML = playbackEvents.map((e, i) => `
      <div class="event-card" data-index="${i}" onclick="seekToEvent(${i})">
        <div class="event-time" title="${e._ts ? new Date(e._ts).toLocaleString() : ''}">${formatTimestamp(e.offsetSec)}</div>
        <span class="event-type ${eventTypeClass(e.type)}">${e.type || 'event'}</span>
        <div class="event-detail">${eventDetails(e)}</div>
        ${e._ts ? '<div class="event-ts">' + new Date(e._ts).toLocaleTimeString() + '</div>' : ''}
      </div>
    `).join('');
  }

  function seekToEvent(index) {
    const event = playbackEvents[index];
    if (!event) return;
    const video = document.getElementById('playback-video');
    video.currentTime = event.offsetSec;
  }

  function highlightCurrentEvent(currentTime) {
    let activeIndex = -1;
    for (let i = playbackEvents.length - 1; i >= 0; i--) {
      if (playbackEvents[i].offsetSec <= currentTime) {
        activeIndex = i;
        break;
      }
    }

    const cards = document.querySelectorAll('#events-list .event-card');
    cards.forEach((card, i) => {
      const isActive = i === activeIndex;
      card.classList.toggle('active', isActive);
      if (isActive) {
        const container = document.getElementById('events-list');
        const cardTop = card.offsetTop - container.offsetTop;
        const cardHeight = card.offsetHeight;
        const scrollTop = container.scrollTop;
        const containerHeight = container.clientHeight;
        if (cardTop < scrollTop || cardTop + cardHeight > scrollTop + containerHeight) {
          container.scrollTop = cardTop - containerHeight / 2 + cardHeight / 2;
        }
      }
    });
  }

  // Init — restore API key from localStorage
  const savedKey = localStorage.getItem('p0rtal_api_key');
  if (savedKey) document.getElementById('api-key').value = savedKey;

  checkHealth();
  loadDestinations();
  loadSessions();
  setupAutoRefresh();
</script>
