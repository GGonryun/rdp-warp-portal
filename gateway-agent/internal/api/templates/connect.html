<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect to {{.TargetName}}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: #fff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #161616;
            border: 1px solid #262626;
            border-radius: 12px;
            padding: 48px;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }
        .target-name {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .target-host {
            color: #666;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .token-label {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
        }
        .token {
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', 'Courier New', monospace;
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 8px;
            color: #fff;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 16px 32px;
            display: inline-block;
            cursor: pointer;
            user-select: all;
            margin-bottom: 8px;
            transition: border-color 0.2s;
        }
        .token:hover {
            border-color: #2563eb;
        }
        .token:active {
            border-color: #3b82f6;
        }
        .copied-msg {
            color: #2563eb;
            font-size: 13px;
            height: 20px;
            margin-bottom: 24px;
            transition: opacity 0.3s;
        }
        .download-btn {
            display: inline-block;
            padding: 14px 36px;
            background: #2563eb;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
        }
        .download-btn:hover {
            background: #1d4ed8;
        }
        .steps {
            margin-top: 32px;
            text-align: left;
            color: #888;
            font-size: 14px;
            line-height: 2.2;
        }
        .steps .num {
            display: inline-block;
            width: 24px;
            height: 24px;
            background: #222;
            border-radius: 50%;
            text-align: center;
            line-height: 24px;
            font-size: 12px;
            color: #666;
            margin-right: 10px;
            vertical-align: middle;
        }
        .expires {
            color: #444;
            font-size: 12px;
            margin-top: 24px;
        }
        .status-bar {
            margin-top: 16px;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            display: none;
        }
        .status-bar.active {
            display: block;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22c55e;
        }
        .status-bar.ended {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }
        .monitor-link {
            display: inline-block;
            margin-top: 16px;
            color: #2563eb;
            font-size: 13px;
            text-decoration: none;
        }
        .monitor-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="target-name">{{.TargetName}}</div>
        <div class="target-host">{{.TargetHost}}</div>

        <div class="token-label">Session Token</div>
        <div class="token" id="token" onclick="copyToken()">{{.Token}}</div>
        <div class="copied-msg" id="copiedMsg">&nbsp;</div>

        <a href="{{.RDPFileURL}}" class="download-btn" id="downloadBtn">
            Download Connection File
        </a>

        <div class="steps">
            <div><span class="num">1</span>Click the button above to download the .rdp file</div>
            <div><span class="num">2</span>Open the downloaded file</div>
            <div><span class="num">3</span>When prompted for password, paste the token above</div>
        </div>

        <div class="status-bar" id="statusBar"></div>

        <a href="{{.MonitorURL}}" class="monitor-link" id="monitorLink" style="display:none;" target="_blank">
            Open Live Monitor →
        </a>

        <div class="expires" id="expiresText">
            Session expires at {{.ExpiresAt}}
        </div>
    </div>

    <script>
        const token = '{{.Token}}';
        const statusUrl = '{{.StatusURL}}';
        const copiedMsg = document.getElementById('copiedMsg');
        const statusBar = document.getElementById('statusBar');
        const monitorLink = document.getElementById('monitorLink');
        const downloadBtn = document.getElementById('downloadBtn');

        window.addEventListener('load', function() {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(token).then(function() {
                    showCopied();
                }).catch(function() {});
            }
        });

        function copyToken() {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(token).then(showCopied);
            } else {
                var textarea = document.createElement('textarea');
                textarea.value = token;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showCopied();
            }
        }

        function showCopied() {
            copiedMsg.textContent = 'Copied to clipboard';
            setTimeout(function() {
                copiedMsg.innerHTML = '&nbsp;';
            }, 3000);
        }

        function pollStatus() {
            fetch(statusUrl)
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.status === 'active') {
                        statusBar.className = 'status-bar active';
                        statusBar.textContent = '● Session connected';
                        monitorLink.style.display = 'inline-block';
                    } else if (data.status === 'completed' || data.status === 'terminated') {
                        statusBar.className = 'status-bar ended';
                        statusBar.textContent = '● Session ended';
                        monitorLink.style.display = 'none';
                        downloadBtn.style.opacity = '0.5';
                        downloadBtn.style.pointerEvents = 'none';
                        return;
                    } else if (data.status === 'disconnected') {
                        statusBar.className = 'status-bar active';
                        statusBar.textContent = '● Disconnected — waiting for reconnection...';
                        monitorLink.style.display = 'inline-block';
                    } else if (data.status === 'failed') {
                        statusBar.className = 'status-bar ended';
                        statusBar.textContent = '● Session failed';
                        downloadBtn.style.opacity = '0.5';
                        downloadBtn.style.pointerEvents = 'none';
                        return;
                    }
                    setTimeout(pollStatus, 5000);
                })
                .catch(function() {
                    setTimeout(pollStatus, 5000);
                });
        }

        pollStatus();
    </script>
</body>
</html>
