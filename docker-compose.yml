services:
  broker:
    build: ./proxy
    init: true
    ports:
      - "8080:8080"
      - "33400-33500:33400-33500"
    environment:
      - BROKER_HOST=${BROKER_HOST}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./proxy/targets.json:/etc/rdp-broker/targets.json:ro
      - ./web:/usr/share/p0rtal/web:ro
      - recordings:/var/lib/p0rtal/recordings
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  recordings:
