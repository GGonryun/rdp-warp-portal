services:
  broker:
    build: ./proxy
    init: true
    ports:
      - "8080:8080"
      - "33400-33500:33400-33500"
    environment:
      - BROKER_HOST=${BROKER_HOST}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./proxy/targets.json:/etc/rdp-broker/targets.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web:
    image: nginx:alpine
    ports:
      - "3000:3000"
    volumes:
      - ./web/index.html:/usr/share/nginx/html/index.html:ro
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      broker:
        condition: service_healthy
    restart: unless-stopped
