services:
  broker:
    build: .
    init: true
    ports:
      - "8080:8080"
      - "33400-33500:33400-33500"
    environment:
      - BROKER_HOST=${BROKER_HOST}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./targets.json:/etc/rdp-broker/targets.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
