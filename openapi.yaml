openapi: 3.0.3
info:
  title: P0rtal RDP Broker API
  description: API for managing RDP sessions through the P0rtal broker proxy.
  version: 3.0.0

servers:
  - url: http://localhost:8080
    description: Local development

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >-
        API key passed as Bearer token. Used for management API endpoints
        (access control, public keys, recordings, secrets).
    JWTAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Signed JWT for user access API (POST /api/sessions). The JWT must
        contain a `sub` claim (user email) and be signed with a private key
        whose public key is registered via /api/public-keys.

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        code:
          type: integer
        message:
          type: string

    HostConfig:
      type: object
      required: [hostname, ip]
      properties:
        hostname:
          type: string
          example: mike-rdp
        ip:
          type: string
          example: 10.1.0.7
        port:
          type: integer
          default: 3389
          example: 3389
        domain:
          type: string
          example: P0-LAB-1

    UserConfig:
      type: object
      required: [email, username, secret]
      properties:
        email:
          type: string
          format: email
          example: miguel.campos@p0.dev
        username:
          type: string
          description: Windows username for RDP login
          example: rdpadmin
        secret:
          type: string
          description: Secret name in Google Secret Manager
          example: p0_windows_domain_rdpadmin

    Grant:
      type: object
      required: [host, user]
      properties:
        host:
          $ref: "#/components/schemas/HostConfig"
        user:
          $ref: "#/components/schemas/UserConfig"

    RevokeRequest:
      type: object
      required: [email, hostname]
      properties:
        email:
          type: string
          format: email
          example: miguel.campos@p0.dev
        hostname:
          type: string
          example: mike-rdp

    PublicKeyRequest:
      type: object
      required: [email, public_key]
      properties:
        email:
          type: string
          format: email
          example: miguel.campos@p0.dev
        public_key:
          type: string
          description: Public key in PEM, SSH authorized key, or base64 DER format
          example: "ssh-rsa AAAA..."

    PublicKeyDeleteRequest:
      type: object
      required: [email, fingerprint]
      properties:
        email:
          type: string
          format: email
        fingerprint:
          type: string
          description: SHA256 fingerprint of the key to delete
          example: "SHA256:abc..."

    PublicKeyEntry:
      type: object
      properties:
        email:
          type: string
          format: email
        public_key:
          type: string
        fingerprint:
          type: string

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, ready]
        active_sessions:
          type: integer
        available_ports:
          type: integer

    CreateSessionRequest:
      type: object
      required: [hostname]
      properties:
        hostname:
          type: string
          description: Hostname of the target machine to connect to
          example: mike-rdp

    CreateSessionResponse:
      type: object
      properties:
        session_id:
          type: string
        proxy_host:
          type: string
        proxy_port:
          type: integer
        rdp_file_content:
          type: string
          description: Full RDP file content. Save as .rdp and open with an RDP client.
        state:
          type: string
          enum: [creating, active, connected, terminating, terminated]
        created_at:
          type: string
          format: date-time
        token_expires_at:
          type: string
          format: date-time

    Session:
      type: object
      properties:
        session_id:
          type: string
        user_id:
          type: string
        target_id:
          type: string
          description: Hostname of the target
        target_host:
          type: string
        proxy_port:
          type: integer
        state:
          type: string
          enum: [creating, active, connected, terminating, terminated]
        pid:
          type: integer
        created_at:
          type: string
          format: date-time
        connected_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true

    CreateRecordingRequest:
      type: object
      properties:
        session_id:
          type: string
        target_id:
          type: string
        target_name:
          type: string
        windows_user:
          type: string
        proxy_user:
          type: string
        agent_hostname:
          type: string
        chunk_secs:
          type: integer

    Recording:
      type: object
      properties:
        id:
          type: string
        session_id:
          type: string
        target_id:
          type: string
        target_name:
          type: string
        windows_user:
          type: string
        proxy_user:
          type: string
        agent_hostname:
          type: string
        status:
          type: string
          enum: [recording, completed, failed]
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
          nullable: true
        duration_secs:
          type: number
        chunk_secs:
          type: integer
        chunk_count:
          type: integer
        total_bytes:
          type: integer
        event_count:
          type: integer

    RecordingEvent:
      type: object
      properties:
        ts:
          type: string
          format: date-time
        type:
          type: string
          enum: [process_start, process_end, window_focus, mouse_click, clipboard, winlog]
        data:
          type: object
          additionalProperties: true

paths:
  /health:
    get:
      summary: Health check
      security: []
      tags: [Health]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /healthz:
    get:
      summary: Health check (alias)
      security: []
      tags: [Health]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /ready:
    get:
      summary: Readiness probe
      security: []
      tags: [Health]
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/sessions:
    post:
      summary: Create RDP session
      description: >-
        Creates a new RDP session. Requires a signed JWT (not an API key).
        The user's identity is extracted from the JWT `sub` claim. The proxy
        finds the matching grant by (email, hostname) and uses the stored
        host + user config to create the session.
      tags: [Sessions]
      security:
        - JWTAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSessionResponse"
        "400":
          description: Missing hostname
        "401":
          description: Invalid or missing JWT
        "403":
          description: No matching grant for this user + hostname
        "503":
          description: Session limit reached or secret resolution failed
    get:
      summary: List sessions
      tags: [Sessions]
      security:
        - BearerAuth: []
      parameters:
        - name: user_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"

  /api/sessions/{id}:
    get:
      summary: Get session
      tags: [Sessions]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Session not found
    delete:
      summary: Terminate session
      tags: [Sessions]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Session terminated
        "404":
          description: Session not found

  /api/sessions/{id}/rdp:
    get:
      summary: Download RDP file
      tags: [Sessions]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: RDP file
          content:
            application/x-rdp:
              schema:
                type: string
                format: binary
        "404":
          description: Session not found

  /api/access:
    get:
      summary: List all access grants
      description: Returns all grants with full host + user configuration.
      tags: [Access Control]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of grants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Grant"

  /api/grant:
    post:
      summary: Grant access
      description: >-
        Creates or updates an access grant with full host + user configuration.
        Idempotent — re-granting the same (email, hostname) updates the config.
      tags: [Access Control]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Grant"
      responses:
        "200":
          description: Access granted
        "400":
          description: Missing required fields

  /api/revoke:
    post:
      summary: Revoke access
      description: >-
        Revokes access for (email, hostname) and terminates active sessions.
      tags: [Access Control]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevokeRequest"
      responses:
        "200":
          description: Access revoked
        "404":
          description: Grant not found

  /api/public-keys:
    get:
      summary: List all public keys
      tags: [Public Keys]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of registered public keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicKeyEntry"
    post:
      summary: Register a public key
      description: >-
        Adds a public key for a user email. A user can have multiple keys.
        Idempotent — adding the same key is a no-op.
      tags: [Public Keys]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicKeyRequest"
      responses:
        "200":
          description: Key registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  fingerprint:
                    type: string
        "400":
          description: Invalid email or public key
    delete:
      summary: Remove a public key
      description: Removes a specific key by email + fingerprint.
      tags: [Public Keys]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicKeyDeleteRequest"
      responses:
        "200":
          description: Key removed
        "404":
          description: Key not found

  /api/recordings:
    post:
      summary: Create recording
      tags: [Recordings]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecordingRequest"
      responses:
        "201":
          description: Recording created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recording"
    get:
      summary: List recordings
      tags: [Recordings]
      security:
        - BearerAuth: []
      parameters:
        - name: target
          in: query
          schema:
            type: string
        - name: user
          in: query
          schema:
            type: string
        - name: start
          in: query
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          schema:
            type: string
            format: date-time
        - name: status
          in: query
          schema:
            type: string
            enum: [recording, completed, failed]
      responses:
        "200":
          description: List of recordings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recording"

  /api/recordings/{id}:
    get:
      summary: Get recording metadata
      tags: [Recordings]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Recording metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recording"
        "404":
          description: Recording not found
    delete:
      summary: Delete recording
      tags: [Recordings]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Recording deleted
        "404":
          description: Recording not found

  /api/recordings/{id}/chunks:
    post:
      summary: Upload video chunk
      tags: [Recordings]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          video/mp2t:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Chunk uploaded
        "404":
          description: Recording not found

  /api/recordings/{id}/events:
    post:
      summary: Send recording events
      tags: [Recordings]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/RecordingEvent"
      responses:
        "204":
          description: Events received
        "404":
          description: Recording not found
    get:
      summary: Get recording events
      tags: [Recordings]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecordingEvent"
        "404":
          description: Recording not found

  /api/recordings/{id}/end:
    put:
      summary: End recording
      tags: [Recordings]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Recording finalized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recording"
        "404":
          description: Recording not found

  /api/recordings/{id}/video:
    get:
      summary: Stream recording video
      tags: [Recordings]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Video file
          content:
            video/mp4:
              schema:
                type: string
                format: binary
        "404":
          description: Recording or video not found
